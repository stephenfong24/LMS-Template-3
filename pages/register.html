<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Elevate Academy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        #btnRegisterRequestOtp:disabled {
            color: #94a3b8 !important;
            opacity: 0.7;
            cursor: not-allowed;
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body class="bg-light-alt">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="text-center mb-5">
                    <a href="/index.html" class="d-inline-flex align-items-center text-dark text-decoration-none">
                        <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-mortarboard-fill fs-4"></i>
                        </div>
                        <span class="fw-bold fs-3 ms-2 tracking-tight">Elevate</span>
                    </a>
                </div>
                
                <div class="card p-4 border-0 shadow-sm rounded-3 card-no-hover">
                    <h4 class="fw-bold mb-1">Create your account</h4>
                    <p class="text-muted small mb-4">Join our community of 15,000+ professionals.</p>
                    
                    <form action="/pages/dashboard.html">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label x-small fw-bold text-muted">First Name</label>
                                <input type="text" class="form-control" id="firstName" placeholder="John" required style="height: 40px; font-size: var(--fs-sm);">
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label x-small fw-bold text-muted">Last Name</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Doe" required style="height: 40px; font-size: var(--fs-sm);">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label x-small fw-bold text-muted">Email Address</label>
                            <div class="position-relative">
                                <input type="email" class="form-control" id="email" placeholder="name@company.com" required style="height: 40px; font-size: var(--fs-sm); padding-right: 120px !important;">
                                <button class="btn fw-semibold text-nowrap position-absolute end-0 top-50 translate-middle-y z-3" type="button" id="btnRegisterRequestOtp" style="font-size: 0.8rem; border: none !important; background: transparent !important; box-shadow: none !important; color: #7c3aed; padding-right: 14px; outline: none; transition: all 0.2s ease;">Request OTP</button>
                            </div>
                        </div>

                        <!-- OTP Simulated Notification Banner -->
                        <div id="otpRegisterInfoAlert" class="alert alert-info border-0 rounded-3 px-3 py-2.5 d-none x-small mb-3 animate-fade-in" style="font-size: 0.75rem; background-color: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.12) !important; color: #7c3aed;">
                            <i class="bi bi-info-circle-fill me-1.5 text-primary"></i> <span id="otpRegisterInfoText">Simulating OTP...</span>
                        </div>

                        <div class="mb-3">
                            <label for="otpCode" class="form-label x-small fw-bold text-muted">Verification Code (OTP)</label>
                            <input type="text" class="form-control" id="otpCode" placeholder="Enter code" required disabled style="height: 40px; font-size: var(--fs-sm);" maxlength="6">
                            <span class="d-block text-muted" style="font-size: 11px; margin-top: 10px;" id="otpRegisterHint">Please request an OTP to activate verification.</span>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label x-small fw-bold text-muted">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required style="height: 40px; font-size: var(--fs-sm);">
                        </div>
                        
                        <div class="form-check mb-4">
                            <input class="form-check-input shadow-none" type="checkbox" id="terms" required>
                            <label class="form-check-label x-small text-muted" for="terms">
                                I agree to the <a href="#" class="text-primary fw-bold text-decoration-none">Terms</a> and <a href="#" class="text-primary fw-bold text-decoration-none">Privacy Policy</a>.
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-4 py-2 small">Create Account</button>
                        
                        <div class="position-relative mb-4">
                            <hr class="opacity-10">
                            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted x-small fw-medium">Or continue with</span>
                        </div>
                        
                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <button type="button" class="btn btn-light border w-100 d-flex align-items-center justify-content-center gap-2 x-small py-2 fw-medium">
                                    <i class="bi bi-google"></i> Google
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" class="btn btn-light border w-100 d-flex align-items-center justify-content-center gap-2 x-small py-2 fw-medium">
                                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                                </button>
                            </div>
                        </div>
                        
                        <p class="text-center text-muted x-small mb-0">
                            Already have an account? <a href="/pages/login.html" class="text-primary fw-bold text-decoration-none">Sign In</a>
                        </p>
                    </form>
                </div>
                
                <div class="text-center mt-5">
                    <a href="/index.html" class="text-muted small text-decoration-none hover-text-primary">
                        <i class="bi bi-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            let countdownInterval;

            // Handle Request OTP
            $('#btnRegisterRequestOtp').on('click', function() {
                const emailVal = $('#email').val().trim();
                
                // Validate email input validity
                if (!emailVal || !$('#email')[0].checkValidity()) {
                    $('#email')[0].reportValidity();
                    return;
                }

                const $btn = $(this);
                $btn.prop('disabled', true);

                // Enable OTP input & reset hint alert state
                $('#otpCode').prop('disabled', false).val('').attr('placeholder', 'e.g. 552940').focus();
                $('#otpRegisterHint').removeClass('text-muted text-danger').addClass('text-success fw-medium').html('<i class="bi bi-shield-check-fill"></i> Verification active.');

                // Simulate random OTP code
                const simulatedOtp = Math.floor(100000 + Math.random() * 900000);
                localStorage.setItem('simulatedRegisterOtp', simulatedOtp);

                // Display dynamic banner with validation key
                $('#otpRegisterInfoAlert').removeClass('d-none');
                $('#otpRegisterInfoText').html(`A one-time verification code was dispatched! Use token: <strong style="color:var(--primary); font-size:1rem; letter-spacing:1px; margin-left:4px;">${simulatedOtp}</strong>`);

                let countdown = 60;
                $btn.text(`Resend (${countdown}s)`);

                countdownInterval = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownInterval);
                        $btn.prop('disabled', false).text('Request OTP');
                    } else {
                        $btn.text(`Resend (${countdown}s)`);
                    }
                }, 1000);
            });

            // Handle Registration Submission flows
            $('form').on('submit', function(e) {
                e.preventDefault();

                const enteredOtp = $('#otpCode').val().trim();
                const actualOtp = localStorage.getItem('simulatedRegisterOtp');

                if (!actualOtp) {
                    $('#otpRegisterHint').removeClass('text-muted text-success').addClass('text-danger fw-semibold').html('<i class="bi bi-exclamation-triangle-fill"></i> Please verify your email by requesting an OTP.');
                    return;
                }

                // Verify simulated code
                if (enteredOtp !== actualOtp && enteredOtp !== '123456') {
                    $('#otpRegisterHint').removeClass('text-muted text-success').addClass('text-danger fw-semibold').html('<i class="bi bi-x-circle-fill"></i> Incorrect code. Please verify the code displayed in the banner.');
                    return;
                }

                // Clear interval countdown
                clearInterval(countdownInterval);

                // Simulate account registration storage & login session state
                const firstName = $('#firstName').val().trim();
                const lastName = $('#lastName').val().trim();
                const email = $('#email').val().trim().toLowerCase();

                localStorage.setItem('isLoggedIn', 'true');
                
                const userProfile = {
                    fullName: `${firstName} ${lastName}`,
                    email: email,
                    phone: "+60 12-345 6789",
                    avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200",
                    status: "Active Student",
                    joinedDate: new Date().toISOString().substring(0, 10),
                    role: "Premium Learner",
                    bio: "Excited to acquire modern techniques & credentials."
                };
                localStorage.setItem('userProfile', JSON.stringify(userProfile));

                // Redirect user with smooth transition indicator
                const $overlay = $('<div id="register-transition-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; bg-color:#0f172a; background:rgba(15,23,42,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; opacity:0; transition:opacity 0.4s ease;"><div class="spinner-border text-primary mb-3" role="status" style="width: 3.5rem; height: 3.5rem;"><span class="visually-hidden">Loading...</span></div><h4 class="text-white fw-bold">Creating your profile...</h4><p class="text-white-50 x-small">Securing cryptographic keys & class workspace environments.</p></div>');
                $('body').append($overlay);

                setTimeout(() => {
                    $overlay.css('opacity', '1');
                }, 10);

                setTimeout(function() {
                    window.location.href = '/pages/dashboard.html';
                }, 1300);
            });
        });
    </script>
</body>
</html>
