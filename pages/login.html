<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elevate Academy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light-alt">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="text-center mb-5">
                    <a href="/index.html" class="d-inline-flex align-items-center text-dark text-decoration-none">
                        <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-mortarboard-fill fs-4"></i>
                        </div>
                        <span class="fw-bold fs-3 ms-2 tracking-tight">Elevate</span>
                    </a>
                </div>
                
                <div class="card p-4 border-0 shadow-sm rounded-3 card-no-hover">
                    <h4 class="fw-bold mb-1">Welcome back</h4>
                    <p class="text-muted small mb-4">Log in to your account to continue.</p>
                    
                    <form action="/pages/dashboard.html">
                        <div class="mb-3">
                            <label for="email" class="form-label x-small fw-bold text-muted text-uppercase tracking-wider">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="name@company.com" required style="height: 44px; font-size: var(--fs-sm);">
                        </div>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label for="password" class="form-label x-small fw-bold text-muted text-uppercase tracking-wider">Password</label>
                                <a href="/pages/forgot-password.html" class="x-small text-primary fw-semibold text-decoration-none mb-2">Forgot password?</a>
                            </div>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required style="height: 44px; font-size: var(--fs-sm);">
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input shadow-none" type="checkbox" id="rememberMe">
                            <label class="form-check-label x-small text-muted" for="rememberMe">
                                Keep me logged in
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-4 py-2 small">Sign In</button>
                        
                        <div class="position-relative mb-4">
                            <hr class="opacity-10">
                            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted x-small fw-medium">Or continue with</span>
                        </div>
                        
                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <button type="button" class="btn btn-light border w-100 d-flex align-items-center justify-content-center gap-2 x-small py-2 fw-medium">
                                    <i class="bi bi-google"></i> Google
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" class="btn btn-light border w-100 d-flex align-items-center justify-content-center gap-2 x-small py-2 fw-medium">
                                    <i class="bi bi-linkedin text-primary"></i> LinkedIn
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <p class="text-center text-muted x-small mb-0">
                        Don't have an account? <a href="/pages/register.html" class="text-primary fw-bold text-decoration-none">Join for free</a>
                    </p>
                </div>
                
                <div class="text-center mt-5">
                    <a href="/index.html" class="text-muted small text-decoration-none hover-text-primary">
                        <i class="bi bi-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
