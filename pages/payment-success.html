<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Elevate Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .success-card {
            max-width: 600px;
            margin: 60px auto;
        }
        .success-icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--p-500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 24px;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navbar placeholder - will be injected by components.js -->
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden success-card">
            <div class="card-body p-5 text-center">
                <div class="success-icon-wrapper">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2 class="fw-bold mb-2">Payment Successful!</h2>
                <p class="text-muted mb-5">Your enrollment has been confirmed. Get ready to transform your career.</p>

                <div class="bg-light rounded-4 p-4 text-start mb-4">
                    <h6 class="fw-bold mb-3 small text-uppercase tracking-wider text-muted">Order Details</h6>
                    <div class="d-flex gap-3 mb-3">
                        <img id="course-img" src="" class="rounded-3 shadow-sm" style="width: 80px; height: 56px; object-fit: cover;">
                        <div>
                            <h6 id="course-title" class="fw-bold mb-1 small">Course Title Loading...</h6>
                            <p id="course-instructor" class="text-muted mb-0 x-small">Instructor</p>
                        </div>
                    </div>
                    <hr class="opacity-10 my-3">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">Transaction ID</span>
                        <span class="fw-medium small" id="tx-id">#00000000</span>
                    </div>
                    <div class="d-flex justify-content-between mb-0">
                        <span class="text-muted small">Amount Paid</span>
                        <span class="fw-bold text-success small" id="amount-paid">RM 0.00</span>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <a href="/pages/dashboard.html" class="btn btn-primary py-3 fw-bold rounded-3">Go to My Courses</a>
                    <a href="/index.html" class="btn btn-link text-muted text-decoration-none small">Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer placeholder - will be injected by components.js -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js"></script>
    <script>
        $(document).ready(function() {
            // Load purchase data from localStorage
            const purchaseData = JSON.parse(localStorage.getItem('lastPurchase'));
            
            if (!purchaseData) {
                window.location.href = 'courses.html';
                return;
            }

            // Populate UI
            $('#course-img').attr('src', purchaseData.img);
            $('#course-title').text(purchaseData.title);
            $('#course-instructor').text('with ' + purchaseData.instructor);
            $('#tx-id').text(purchaseData.txId);
            $('#amount-paid').text('RM ' + purchaseData.price);
        });
    </script>
</body>
</html>
