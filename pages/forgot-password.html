<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Elevate Academy</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        #btnRequestOtp:disabled {
            color: #94a3b8 !important;
            opacity: 0.7;
            cursor: not-allowed;
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body class="bg-light-alt">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="text-center mb-5">
                    <a href="/index.html" class="d-inline-flex align-items-center text-dark text-decoration-none">
                        <div class="bg-primary text-white rounded-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                            <i class="bi bi-mortarboard-fill fs-4"></i>
                        </div>
                        <span class="fw-bold fs-3 ms-2 tracking-tight">Elevate</span>
                    </a>
                </div>
                
                <div class="card p-4 border-0 shadow-sm rounded-3 card-no-hover">
                    <h4 class="fw-bold mb-1">Reset password</h4>
                    <p class="text-muted small mb-4">Enter your email and we'll send you a link to reset your password.</p>
                    
                    <form id="resetForm">
                        <div class="mb-3">
                            <label for="email" class="form-label x-small fw-bold text-muted">Email Address</label>
                            <div class="position-relative">
                                <input type="email" class="form-control" id="email" placeholder="name@company.com" required style="height: 44px; font-size: var(--fs-sm); padding-right: 120px !important;">
                                <button class="btn fw-semibold text-nowrap position-absolute end-0 top-50 translate-middle-y z-3" type="button" id="btnRequestOtp" style="font-size: 0.8rem; border: none !important; background: transparent !important; box-shadow: none !important; color: #7c3aed; padding-right: 14px; outline: none; transition: all 0.2s ease;">Request OTP</button>
                            </div>
                        </div>

                        <!-- OTP Simulated Notification -->
                        <div id="otpInfoAlert" class="alert alert-info border-0 rounded-3 px-3 py-2.5 d-none x-small mb-3 animate-fade-in" style="font-size: 0.75rem; background-color: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.12) !important; color: #7c3aed;">
                            <i class="bi bi-info-circle-fill me-1.5 text-primary"></i> <span id="otpInfoText">Simulating OTP...</span>
                        </div>

                        <div class="mb-4">
                            <label for="otpCode" class="form-label x-small fw-bold text-muted">Verification Code (OTP)</label>
                            <input type="text" class="form-control" id="otpCode" placeholder="Enter code" required disabled style="height: 44px; font-size: var(--fs-sm);" maxlength="6">
                            <span class="d-block text-muted" style="font-size: 11px; margin-top: 10px;" id="otpHint">Please request an OTP to activate verification.</span>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-4 py-2 small" style="height: 44px;">Reset Password</button>
                        
                        <p class="text-center text-muted x-small mb-0">
                            Remember your password? <a href="/pages/login.html" class="text-primary fw-bold text-decoration-none">Sign In</a>
                        </p>
                    </form>

                    <div id="successMsg" class="d-none text-center py-2">
                        <div class="bg-success bg-opacity-10 text-success p-3 rounded-2 mb-4">
                            <i class="bi bi-check-circle me-2"></i> Reset link sent! Check your inbox.
                        </div>
                        <a href="/pages/login.html" class="btn btn-light border w-100 small">Back to Login</a>
                    </div>
                </div>
                
                <div class="text-center mt-5">
                    <a href="/index.html" class="text-muted small text-decoration-none hover-text-primary">
                        <i class="bi bi-arrow-left me-1"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            let countdownInterval;

            $('#btnRequestOtp').on('click', function() {
                const emailVal = $('#email').val().trim();
                // Check standard form validity for the email input
                if (!emailVal || !$('#email')[0].checkValidity()) {
                    $('#email')[0].reportValidity();
                    return;
                }

                const $btn = $(this);
                $btn.prop('disabled', true);

                // Enable OTP input box & clear previous validation states
                $('#otpCode').prop('disabled', false).val('').attr('placeholder', 'e.g. 884920').focus();
                $('#otpHint').removeClass('text-muted text-danger').addClass('text-success fw-medium').html('<i class="bi bi-shield-check-fill"></i> Verification active.');

                // Simulate OTP token secret
                const simulatedOtp = Math.floor(100000 + Math.random() * 900000);
                localStorage.setItem('simulatedResetOtp', simulatedOtp);

                // Display dynamic banner with key to verify
                $('#otpInfoAlert').removeClass('d-none');
                $('#otpInfoText').html(`A one-time security code was sent! Use simulation code: <strong style="color:var(--primary); font-size:1rem; letter-spacing:1px; margin-left:4px;">${simulatedOtp}</strong>`);

                let countdown = 60;
                $btn.text(`Resend (${countdown}s)`);

                countdownInterval = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(countdownInterval);
                        $btn.prop('disabled', false).text('Request OTP');
                    } else {
                        $btn.text(`Resend (${countdown}s)`);
                    }
                }, 1000);
            });

            $('#resetForm').on('submit', function(e) {
                e.preventDefault();

                const enteredOtp = $('#otpCode').val().trim();
                const actualOtp = localStorage.getItem('simulatedResetOtp');

                if (!actualOtp) {
                    $('#otpHint').removeClass('text-muted text-success').addClass('text-danger fw-semibold').html('<i class="bi bi-exclamation-triangle-fill"></i> Please request a security OTP first.');
                    return;
                }

                // Accept any generated OTP or fallback 123456 code to be safe with testing
                if (enteredOtp !== actualOtp && enteredOtp !== '123456') {
                    $('#otpHint').removeClass('text-muted text-success').addClass('text-danger fw-semibold').html('<i class="bi bi-x-circle-fill"></i> Incorrect code. Please use the simulated token above.');
                    return;
                }

                clearInterval(countdownInterval);
                $(this).addClass('d-none');
                $('#successMsg').removeClass('d-none');
            });
        });
    </script>
</body>
</html>
